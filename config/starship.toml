[directory]
style = "fg:#e3e5e5 bg:#7465b1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#523f9e"
format = '[[ $symbol $branch ](fg:#7465b1 bg:#523f9e)]($style)'

[git_status]
style = "bg:#523f9e"
format = '[[($all_status$ahead_behind )](fg:#7465b1 bg:#523f9e)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#41327e"
format = '[[ $symbol ($version) ](fg:#7465b1 bg:#41327e)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#41327e"
format = '[[ $symbol ($version) ](fg:#7465b1 bg:#41327e)]($style)'

[golang]
